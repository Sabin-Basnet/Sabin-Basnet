name: Profile Stock Exchange

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  run-market:
    if: startsWith(github.event.issue.title, 'market:')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run market engine
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python market_engine.py "${{ github.event.issue.title }}" "${{ github.actor }}" | tee market_output.txt

      - name: Commit market updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market_state.json market_chart.svg README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update market exchange state"
            git push origin main
          fi

      - name: Comment and close issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          output=$(cat market_output.txt 2>/dev/null || true)
          gh issue comment "${{ github.event.issue.number }}" --body "$output"
          gh issue close "${{ github.event.issue.number }}" || true
