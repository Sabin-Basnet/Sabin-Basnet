name: SABIN Market Engine

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: sabin-market
  cancel-in-progress: false

jobs:
  trade:
    if: startsWith(github.event.issue.title, 'market:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # No actions/setup-python — ubuntu-latest ships python3 preinstalled.
      - name: Execute trade
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          GITHUB_ACTOR: ${{ github.event.issue.user.login }}
        run: |
          set +e
          OUTPUT=$(python3 market_engine.py "$ISSUE_TITLE" "$GITHUB_ACTOR" 2>&1)
          set -e

          # Multi-line-safe write to GITHUB_ENV using a heredoc delimiter,
          # so markdown/newlines in the trade result never break the workflow.
          {
            echo "RESULT<<EOF_MARKET_RESULT"
            echo "$OUTPUT"
            echo "EOF_MARKET_RESULT"
          } >> "$GITHUB_ENV"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add market_state.json README.md market_chart.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore(market): trade by @${{ github.event.issue.user.login }} (issue #${{ github.event.issue.number }})"
            git push origin HEAD:main
          else
            echo "No market state changes to commit."
          fi
      - name: Purge jsDelivr CDN cache
        run: |
          # Forces jsDelivr to re-fetch the freshly-pushed SVG immediately,
          # instead of serving a stale cached copy for up to 12h.
          curl -s -o /dev/null -w "%{http_code}\n" \
            "https://purge.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}/market_chart.svg" \
            || echo "jsDelivr purge failed (non-fatal, continuing)"
            
      - name: Comment result on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "${{ env.RESULT }}" --repo "${{ github.repository }}"

      - name: Close issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close "${{ github.event.issue.number }}" --reason "completed" --repo "${{ github.repository }}"