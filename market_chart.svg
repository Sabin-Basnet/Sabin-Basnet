  <polyline points="50.00,270.00 316.67,215.00 583.33,160.00 850.00,105.00" fill="none" stroke="url(#lineGlow)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
  <polygon points="50.00,270.00 50.00,270.00 316.67,215.00 583.33,160.00 850.00,105.00 850.00,270.00" fill="url(#areaGlow)"/>
